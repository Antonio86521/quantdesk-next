<svg width="100%" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">QuantDesk Pro logo</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Bold technical logo for QuantDesk Pro with QD monogram and chart motif in blue gradient</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0d1b3e"/>
    <stop offset="100%" stop-color="#0a1628"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#2d7ff9"/>
    <stop offset="100%" stop-color="#7c5cfc"/>
  </linearGradient>
  <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2d7ff9" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#1a5fd4" stop-opacity="0.4"/>
  </linearGradient>
  <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#5ba3f5" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#2d7ff9" stop-opacity="0.3"/>
  </linearGradient>
  <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#7c5cfc" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#5a3de0" stop-opacity="0.3"/>
  </linearGradient>
  <linearGradient id="bar4" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2d7ff9" stop-opacity="1"/>
    <stop offset="100%" stop-color="#1a5fd4" stop-opacity="0.5"/>
  </linearGradient>
  <linearGradient id="textgrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#c8d8f8"/>
  </linearGradient>
  <clipPath id="iconclip">
    <rect x="60" y="80" width="120" height="120" rx="20"/>
  </clipPath>
</defs>

<!-- Icon mark background -->
<rect x="60" y="80" width="120" height="120" rx="20" fill="url(#bg)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
